name: ai_inspection_env
description: AI system monitoring and incident inspection environment

entry_point: my_env:SystemInspectionEnv

server:
  entrypoint: server.app:app

observation_space:
  type: object
  properties:
    cpu_usage:
      type: number
    memory_usage:
      type: number
    error_rate:
      type: number
    traffic:
      type: number

action_space:
  type: object
  properties:
    decision:
      type: string
      enum: ["ignore", "alert", "escalate"]

reward_range: [-1.0, 1.0]

tasks:
  - name: easy
  - name: medium
  - name: hard
